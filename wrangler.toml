# wrangler.toml — Cloudflare Worker configuration for Iris Iridology Analyzer
# Deploy with: wrangler deploy
# Set API key:  wrangler secret put AI_API_KEY

name            = "iris-analyzer"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ─── KV Namespace ───────────────────────────────────────────────────────────────
# Create with: wrangler kv namespace create IRIS_KV
# Then replace the placeholder IDs below with the real ones from the output.
[[kv_namespaces]]
binding    = "IRIS_KV"
id         = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

# ─── Environment Variables ───────────────────────────────────────────────────
[vars]
# DEFAULT AI provider: "openai", "gemini", or "openai-compatible"
# This can be overridden per-request via the ai_provider form field
AI_PROVIDER = "gemini"

# DEFAULT AI model to use (must support vision)
# This can be overridden per-request via the ai_model form field
#
# Gemini options (recommended):
#   "gemini-2.5-flash-preview-04-17" — Latest 2.5 Flash preview (best quality)
#   "gemini-2.5-flash-latest"        — 2.5 Flash rolling alias
#   "gemini-2.0-flash"               — Stable 2.0 Flash (recommended default)
#   "gemini-2.0-flash-lite"          — Lightweight 2.0 Flash
#   "gemini-1.5-pro-latest"          — Stable 1.5 Pro fallback
#   "gemini-1.5-flash-latest"        — Fast and efficient 1.5 Flash
#
# OpenAI options:
#   "gpt-4o"      — Premium flagship model
#   "gpt-4o-mini" — Cost-effective
#   "gpt-4-turbo" — Previous flagship with vision
#
AI_MODEL    = "gemini-2.0-flash"

# API base URLs (used based on AI_PROVIDER):
# OpenAI:
AI_BASE_URL = "https://api.openai.com/v1"
# Gemini:
GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta"
# For openai-compatible providers (e.g., Anthropic, Azure, Ollama):
#   Azure OpenAI: "https://<resource>.openai.azure.com/openai/deployments/<deploy>/v1"
#   Local Ollama:  "http://localhost:11434/v1"

# ─── Secrets (set via CLI, never commit to source control) ───────────────────────
# Run: wrangler secret put AI_API_KEY
# Then paste your API key when prompted:
#   - For OpenAI: Get from https://platform.openai.com/api-keys
#   - For Gemini: Get from https://aistudio.google.com/app/apikey
# The secret is available in the worker as env.AI_API_KEY

# ─── Quick-start instructions ────────────────────────────────────────────────────
# 1. Install Wrangler:       npm install -g wrangler
# 2. Log in:                 wrangler login
# 3. Create KV namespace:    wrangler kv namespace create IRIS_KV
#    Copy the 'id' and 'preview_id' from the output into this file.
# 4. Set API key secret:     wrangler secret put AI_API_KEY
# 5. Deploy:                 wrangler deploy
#
# ─── API Endpoints ───────────────────────────────────────────────────────────────
#
#   POST /analyze
#     Analyze an unwrapped iris strip image with a single AI call.
#     Form fields:
#       strip_image   — base64 JPEG of the unwrapped iris strip
#       side          — "R" or "L"
#       image_hash    — optional unique ID (auto-generated if omitted)
#       questionnaire — optional JSON: {"age":30,"gender":"female","complaints":"..."}
#       ai_provider   — optional: override default provider ("gemini", "openai", "openai-compatible")
#       ai_model      — optional: override default model (e.g., "gpt-4o", "gemini-2.5-flash-latest")
#
#   GET /result/<side>:<hash>
#     Retrieves a cached analysis (24-hour TTL).
#
#   GET /models
#     Lists available AI providers and models.
#
#   GET /health
#     Health check endpoint (returns config status).
