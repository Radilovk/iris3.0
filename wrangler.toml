# wrangler.toml — Cloudflare Worker configuration for Iris Iridology Analyzer
# Deploy with: wrangler deploy
# Set API key:  wrangler secret put AI_API_KEY

name            = "iris-analyzer"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ─── KV Namespace ───────────────────────────────────────────────────────────────
# Create with: wrangler kv namespace create IRIS_KV
# Then replace the placeholder IDs below with the real ones from the output.
[[kv_namespaces]]
binding    = "IRIS_KV"
id         = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

# ─── Environment Variables ───────────────────────────────────────────────────────
[vars]
# AI model to use (must support vision for STEP1, STEP2A, STEP2B)
AI_MODEL    = "gpt-4o"
# OpenAI-compatible API base URL. Change to use a different provider, e.g.:
#   Anthropic Claude via their OpenAI-compatible proxy
#   Azure OpenAI: "https://<resource>.openai.azure.com/openai/deployments/<deploy>/v1"
#   Local Ollama:  "http://localhost:11434/v1"
AI_BASE_URL = "https://api.openai.com/v1"

# ─── Secrets (set via CLI, never commit to source control) ───────────────────────
# Run: wrangler secret put AI_API_KEY
# Then paste your OpenAI (or compatible) API key when prompted.
# The secret is available in the worker as env.AI_API_KEY

# ─── Quick-start instructions ────────────────────────────────────────────────────
# 1. Install Wrangler:       npm install -g wrangler
# 2. Log in:                 wrangler login
# 3. Create KV namespace:    wrangler kv namespace create IRIS_KV
#    Copy the 'id' and 'preview_id' from the output into this file.
# 4. Set API key secret:     wrangler secret put AI_API_KEY
# 5. Deploy:                 wrangler deploy
#
# Usage after deploy:
#   POST https://<worker-subdomain>.workers.dev/analyze
#     Form fields:
#       strip_image   — base64 JPEG from app.py (/process endpoint, "mapped" field)
#       side          — "R" or "L"
#       image_hash    — optional unique ID (auto-generated if omitted)
#       questionnaire — optional JSON: {"age":30,"gender":"female","complaints":"..."}
#
#   GET https://<worker-subdomain>.workers.dev/result/<side>:<hash>
#     Retrieves a cached analysis (24-hour TTL).
