<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Dual Iris Analyzer (Custom Detection)</title>
    <style>
        body { background: #1a1a1a; color: #ddd; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .admin-link { color: #888; font-size: 0.82rem; text-decoration: none; }
        .admin-link:hover { color: #007bff; }
        .controls { background: #333; padding: 20px; border-radius: 8px; display: flex; gap: 20px; margin-bottom: 20px; }
        .file-group { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .btn:hover { background: #0056b3; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .eye-column { background: #222; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        h2 { border-bottom: 2px solid #555; padding-bottom: 10px; color: #fff; }
        img { max-width: 100%; border: 1px solid #555; margin-top: 10px; display: none; }
        .label { font-weight: bold; color: #aaa; margin-top: 15px; display: block; }
        .ai-result { background: #1a1a2a; border: 1px solid #446; border-radius: 6px;
                     padding: 14px; margin-top: 14px; font-size: 0.85rem; line-height: 1.6;
                     white-space: pre-wrap; color: #cce; display: none; max-height: 400px;
                     overflow-y: auto; }
        .ai-status { color: #ffc107; font-size: 0.82rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Iridology AI Mapper</h1>
            <a class="admin-link" href="/admin">⚙️ Admin Panel</a>
        </div>
        
        <div class="controls">
            <div class="file-group">
                <label>ДЯСНО ОКО (Right):</label>
                <input type="file" id="fileR">
            </div>
            <div class="file-group">
                <label>ЛЯВО ОКО (Left):</label>
                <input type="file" id="fileL">
            </div>
            <button class="btn" onclick="analyze()">АНАЛИЗИРАЙ</button>
        </div>

        <div id="status" style="margin-bottom: 10px; color: yellow;"></div>

        <div class="results-grid">
            <div class="eye-column">
                <h2>RIGHT EYE</h2>
                <span class="label">Детекция:</span>
                <img id="ovlR">
                <span class="label">Карта (Външни координати):</span>
                <img id="mapR">
                <span class="label ai-status" id="aiStatusR"></span>
                <div class="ai-result" id="aiR"></div>
            </div>
            <div class="eye-column">
                <h2>LEFT EYE</h2>
                <span class="label">Детекция:</span>
                <img id="ovlL">
                <span class="label">Карта (Външни координати):</span>
                <img id="mapL">
                <span class="label ai-status" id="aiStatusL"></span>
                <div class="ai-result" id="aiL"></div>
            </div>
        </div>
    </div>

    <script>
        async function analyze() {
            const fR = document.getElementById('fileR').files[0];
            const fL = document.getElementById('fileL').files[0];
            
            if(!fR && !fL) {
                alert("Моля изберете поне една снимка!");
                return;
            }

            const fd = new FormData();
            if(fR) fd.append('image_right', fR);
            if(fL) fd.append('image_left', fL);

            document.getElementById('status').innerText = "Обработка...";
            ['R','L'].forEach(s => {
                document.getElementById('aiStatus'+s).innerText = '';
                document.getElementById('ai'+s).style.display = 'none';
            });
            
            try {
                const res = await fetch('/process', { method: 'POST', body: fd });
                const data = await res.json();

                // Fetch worker URL from config
                const cfgRes = await fetch('/api/config');
                const cfg = await cfgRes.json();
                const workerUrl = (cfg.worker_url || '').replace(/\/$/, '');
                
                const show = (side, d) => {
                    if(d && d.found) {
                        const ovl = document.getElementById('ovl' + side);
                        const map = document.getElementById('map' + side);
                        ovl.src = 'data:image/jpeg;base64,' + d.overlay;
                        map.src = 'data:image/jpeg;base64,' + d.mapped;
                        ovl.style.display = 'block';
                        map.style.display = 'block';
                        // Trigger AI analysis if worker is configured
                        if(workerUrl && d.mapped) {
                            analyzeAI(side, d.mapped, workerUrl);
                        }
                    }
                };

                show('R', data.R);
                show('L', data.L);
                
                document.getElementById('status').innerText = "Готово.";
            } catch(e) {
                document.getElementById('status').innerText = "Грешка: " + e.message;
            }
        }

        async function analyzeAI(side, mappedBase64, workerUrl) {
            const statusEl = document.getElementById('aiStatus' + side);
            const resultEl = document.getElementById('ai' + side);
            statusEl.innerText = "⏳ AI анализ в процес…";

            try {
                const fd = new FormData();
                fd.append('strip_image', mappedBase64);
                fd.append('side', side);

                const resp = await fetch(workerUrl + '/analyze', { method: 'POST', body: fd });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();

                const report = data.result || data;
                const text = typeof report === 'string' ? report
                    : (report.report || report.final_report || JSON.stringify(report, null, 2));

                resultEl.innerText = text;
                resultEl.style.display = 'block';
                statusEl.innerText = data.cached ? "✅ AI анализ (от кеш)" : "✅ AI анализ завършен";
            } catch(e) {
                statusEl.innerText = "⚠️ AI анализ неуспешен: " + e.message;
            }
        }
    </script>
</body>
</html>
